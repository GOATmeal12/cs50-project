{% extends 'layout.html' %}

{% block title %}

 Account Settings

{% endblock  %}

{% block main%}







<div class="accordion accordion-flush" id="accordionFlush">
  <div class="accordion-item">
    <h2 class="accordion-header">
      <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#flush-collapseOne" aria-expanded="false" aria-controls="flush-collapseOne">
        Change Username
      </button>
    </h2>
    <div id="flush-collapseOne" class="accordion-collapse collapse" data-bs-parent="#accordionFlush">
        <div class="accordion-body">
            <form action="/change_username" method="POST">
                <h3>Change Username</h3>
                <label for="username">New Username</label>
                <input name="username" value="{{ current_name }}">
                <label for ="password">Enter your password</label>
                <input required type="password" name="password" autocomplete="off">
                <button type="submit" class="btn btn-primary">Save</button>
            </form>
        </div>
    </div>
  </div>
  <div class="accordion-item">
    <h2 class="accordion-header">
      <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#flush-collapseTwo" aria-expanded="false" aria-controls="flush-collapseTwo">
        Change Password
      </button>
    </h2>
    <div id="flush-collapseTwo" class="accordion-collapse collapse" data-bs-parent="#accordionFlush">
        <div class="accordion-body">
            <form action="/change_password" method="POST">  
                <h3>Change Password</h3>
                <label for="current-password">Current Password</label>
                <input name="current-password" type="password" autocomplete="new-password">
                
                <label for="new-password">New Password</label>
                <input id="password" name="new-password" type="password" autocomplete="new-password">

                <div class="strength-container">
                    <div id="strength-bar"></div>
                </div>

                <div id="strength-text"></div>

                <label for="retype-password">Retype New Password</label>
                <input name="retype-password" type="password" autocomplete="new-password">

                <button type="submit" class="btn btn-primary save-password" >Save</button>
        
            </form>
        </div>
    </div>
  </div>
  <div class="accordion-item">
    <h2 class="accordion-header">
      <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#flush-collapseThree" aria-expanded="false" aria-controls="flush-collapseThree">
        Delete Account
      </button>
    </h2>
    <div id="flush-collapseThree" class="accordion-collapse collapse" data-bs-parent="#accordionFlush">
        <div class="accordion-body">
            <form action="/delete-account" method ="POST">
                <button class="btn btn-danger" onclick="confirm('Are you sure you want to delete your account?')">Delete Account</button>
                <label for ="password" class="mt-3 d-block">Enter your password</label>
                <input required type="password" name="password" autocomplete="off" class="form-control mt-1">
            </form>
        </div>
    </div>
  </div>
</div>



















<script src="{{ url_for('static', filename='auth.js') }}"></script>


{% endblock %}
