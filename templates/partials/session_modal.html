<div class="modal fade" id="sessionModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Edit Practice Session</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">


        <!--Edit Session-->

        <form id="editSessionForm" method="POST">
          <div class="mb-3">
            <label class="form-label">Minutes</label>
            <input type="number" class="form-control" name="minutes" id="modalMinutes" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Notes</label>
            <textarea class="form-control" name="notes" id="modalNotes" rows="3"></textarea>
          </div>

          <div class="d-flex justify-content-between">
            <button type="submit" class="btn btn-primary">Save Changes</button>
          </div>
        </form>

        <hr>

        <!--Delete Session-->
        
        <form id="deleteSessionForm" method="POST">
          <button type="submit" class="btn btn-danger w-100">
            Delete Session
          </button>
        </form>

      </div>

    </div>
  </div>
</div>
