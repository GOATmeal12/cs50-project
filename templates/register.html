{% extends 'layout.html' %}

{% block title %}
Register
{% endblock %}

{% block main %}

<h1>Create an Account</h1>

<form action="{{ url_for('register') }}" method ="post">
    <input required type="text" placeholder="username" name = "username" class="form-control">
    <input required type ="password" placeholder ="password" name ="password" id="password"class="form-control">
      <div class="strength-container">
        <div id="strength-bar"></div>
    </div>

    <div id="strength-text"></div>
    <input required type ="password" placeholder ="confirm password" name ="confirm" class="form-control">
    <button type="submit" class="btn btn-outline-primary save-password" >Register</button>
</form>

<div class ="text-center mt-3">

    <a href="{{ url_for('login') }}" class ="btn btn-link">
        Already have an account? Login
    </a>
</div>


<script src="{{ url_for('static', filename='auth.js') }}"></script>

{% endblock %}
